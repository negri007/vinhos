<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>WineVault</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- HEADER -->
<header class="bg-dark text-white p-3">
    <div class="container d-flex justify-content-between align-items-center">
        <h2>🍷 WineVault</h2>

        <div>
            <input type="text" id="pesquisa" placeholder="Buscar vinhos..." class="form-control">
        </div>

        <button class="btn btn-warning" onclick="abrirCarrinho()">
            🛒 Carrinho (<span id="contador">0</span>)
        </button>
    </div>
</header>

<!-- MENU -->
<nav class="bg-secondary">
    <div class="container">
        <ul class="nav justify-content-center p-2">
            <li class="nav-item"><a class="nav-link text-white" href="#">Início</a></li>
            <li class="nav-item"><a class="nav-link text-white" href="#">Vinhos</a></li>
            <li class="nav-item"><a class="nav-link text-white" href="#">Ofertas</a></li>
            <li class="nav-item"><a class="nav-link text-white" href="#">Sobre</a></li>
            <li class="nav-item"><a class="nav-link text-white" href="#">Contato</a></li>
        </ul>
    </div>
</nav>
<div class="fundo-vinho">

    <!-- FRASE -->
    <section class="text-center p-2">
        <h3>Descubra sabores únicos em cada taça...</h3>
    </section>

    <!-- CARROSSEL PEQUENO -->
   <div id="carouselFaixa" class="carousel slide faixa-carousel" data-bs-ride="carousel">
    
    <div class="carousel-inner">

        <div class="carousel-item active">
            <img src="img/imagem.png" class="d-block w-100">
        </div>

        <div class="carousel-item">
            <img src="img/imagem1.png" class="d-block w-100">
        </div>

        <div class="carousel-item">
            <img src="img/imagem2.png" class="d-block w-100">
        </div>

    </div>

    <button class="carousel-control-prev" type="button" data-bs-target="#carouselFaixa" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
    </button>

    <button class="carousel-control-next" type="button" data-bs-target="#carouselFaixa" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
    </button>

</div>

    <!-- VINHOS -->
    <div class="container">
        ...
    </div>

</div>
<!-- LISTA DE VINHOS -->
<div class="container">
    <h3 class="mb-4">🍷 Nossos Vinhos</h3>
    <div class="row" id="listaVinhos"></div>
</div>

<!-- CARRINHO MODAL -->
<div class="modal fade" id="carrinhoModal">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5>Seu Carrinho</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body" id="itensCarrinho"></div>
        </div>
    </div>
</div>
</div>
<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>

</body>
</html>
